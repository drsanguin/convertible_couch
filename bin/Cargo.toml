[package]
name = "convertible_couch"
version = "2.0.1"
edition = "2024"
authors = ["Thomas PEREZ"]
description = "A CLI tool to quickly switch your computer’s primary display and default speaker, making it easy to move between your desktop and TV for gaming or watching movies."
readme = "../README.md"
repository = "https://github.com/drsanguin/convertible_couch"
license-file = "../LICENSE"

[package.metadata.winresource]
LegalCopyright = "Copyright © 2024 convertible_couch"
OriginalFilename = "convertible_couch.exe"

[dependencies]
clap = { version = "4.5.60", features = ["derive"] }
convertible_couch_lib = { path = "../lib"}

[target.'cfg(windows)'.build-dependencies]
windows = { version = "0.62.2", features = ["Win32_System_SystemServices"] }
winresource = "0.1.30"

[dev-dependencies]
criterion = { version = "0.8.2", features = ["html_reports"] }
test-case = "3.3.1"

[target.'cfg(windows)'.dev-dependencies]
windows = { version = "0.62.2", features = ["Win32_Graphics_Gdi"] }

[[bench]]
name = "benchmark"
harness = false
